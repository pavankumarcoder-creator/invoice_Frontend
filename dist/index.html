<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice & Quotation Management Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Immediately apply saved theme before React renders to prevent flash -->
    <script>
      (function() {
        try {
          var profile = JSON.parse(localStorage.getItem('user_profile') || '{}');
          if (profile.visualPreference === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>

    <link rel="stylesheet" crossorigin href="/assets/index-DlMrnaHv.css">
  </head>

  </body>
</html>
